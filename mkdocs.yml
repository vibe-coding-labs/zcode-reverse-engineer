site_name: ZCode Reverse Engineer
site_description: "ZCode AI 编程助手通信协议逆向分析 — OAuth 授权 / ACP 代理 / Start Plan 激活 / 模型目录"
site_url: https://vibe-coding-labs.github.io/zcode-reverse-engineer/
repo_url: https://github.com/vibe-coding-labs/zcode-reverse-engineer
repo_name: vibe-coding-labs/zcode-reverse-engineer
edit_uri: blob/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - tables
  - footnotes
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vibe-coding-labs/zcode-reverse-engineer
  generator: false

copyright: Copyright &copy; 2026 Vibe Coding Labs

nav:
  - 首页: index.md
  - 授权协议:
    - OAuth 授权流程: auth-flow.md
    - Start Plan 激活协议: activation-protocol.md
  - 通信协议:
    - 协议总览: protocol-overview.md
    - AI 通信协议: ai-protocol.md
    - ACP 代理运行时: acp-proxy.md
    - WebSocket 流式管道: websocket-pipeline.md
  - 模型与计费:
    - 模型目录: reference/model-catalog.md
    - 计费与订阅: reference/billing.md
  - 参考资料:
    - API 端点目录: reference/api-endpoints.md
    - 项目结构: reference/project-structure.md
    - 完整分析报告: ANALYSIS_REPORT.md